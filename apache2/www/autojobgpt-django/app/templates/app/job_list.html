{% extends "base.html" %}

{% block content %}
<h1>Jobs</h1>
{% if object_list %}
  <table>
    <thead>
      <tr>
        <th>URL</th>
        <th>Scraping</th>
        <th>Title</th>
        <th>Company</th>
      </tr>
    </thead>
    <tbody>
      {% for job in object_list %}
        <tr>
          <td>
            <a href="{{job.url}}" target="_blank">{{job.url|truncatechars:80}}</a>
          </td>
          <td>
            {% if job.text %}
              <a href="{% url 'job_text' job.id %}">View</a>
            {% endif %}
          </td>
          <td>{{job.title}}</td>
          <td>{{job.company}}</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
{% else %}
  <p>No jobs yet.</p>
{% endif %}

{% endblock %}
