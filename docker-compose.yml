version: '3.7'
services:
  httpd:
    container_name: httpd
    build: ./httpd
    image: rmsy.me/httpd
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./httpd/htdocs:/usr/local/apache2/htdocs
      - ./httpd/conf:/usr/local/apache2/conf
      - ./httpd/logs:/usr/local/apache2/logs
    secrets:
      - rmsy.me.crt
      - rmsy.me.key
      - el-naggar.co.uk.crt
      - el-naggar.co.uk.key
      - elnaggar.co.uk.crt
      - elnaggar.co.uk.key
      - relnaggar.com.crt
      - relnaggar.com.key
