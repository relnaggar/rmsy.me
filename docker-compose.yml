version: '3.7'
services:
  httpd:
    container_name: httpd
    build: ./httpd
    image: rmsy.me/httpd
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./httpd/htdocs:/usr/local/apache2/htdocs
      - ./httpd/conf:/usr/local/apache2/conf
      - ./httpd/logs:/usr/local/apache2/logs
    secrets:
      - crt
      - key
secrets:
  crt:
    file: ./httpd/ssl/localhost.crt
  key:
    file: ./httpd/ssl/localhost.key
