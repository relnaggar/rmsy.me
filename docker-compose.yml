version: '3.7'
services:
  apache2:
    container_name: apache2
    image: relnaggar/rmsy.me-apache2
    init: true
    ports:
      - 80:8080
      - 443:8443
    volumes:
      - ./apache2/www:/var/www
      - ./apache2/conf:/etc/apache2
      - ./apache2/logs:/var/log/apache2
      - ./apache2/ini:/etc/php/7.3/apache2
    secrets:
      - rmsy.me.crt
      - rmsy.me.key
      - el-naggar.co.uk.crt
      - el-naggar.co.uk.key
      - elnaggar.co.uk.crt
      - elnaggar.co.uk.key
      - relnaggar.com.crt
      - relnaggar.com.key
