version: '3.7'
services:
  apache2:
    container_name: apache2
    init: true
    ports:
      - "80:8080"
      - "443:8443"
    networks:
      - rmsy-me
    volumes:
      - "apache2-logs:/var/log/apache2"
      - "django-media:/var/www/public/media"
  postgres:
    container_name: postgres
    init: true
    hostname: postgres
    networks:
      - rmsy-me
    volumes:
      - "db:/var/lib/postgresql/15/main"
  gotenberg:
    container_name: gotenberg
    image: gotenberg/gotenberg:7
    command:
      - "gotenberg"
      - "--chromium-disable-routes=true"
      - "--webhook-disable=true"
    networks:
      - rmsy-me
networks:
  rmsy-me:
    name: rmsy-me
volumes:
  db:
    external: true
  apache2-logs:
    external: true
  django-media:
    external: true
