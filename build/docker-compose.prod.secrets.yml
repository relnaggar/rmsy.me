version: '3.7'
services:
  apache2:
    secrets:
      - rmsy.me.crt
      - rmsy.me.key
      - el-naggar.co.uk.crt
      - el-naggar.co.uk.key
      - elnaggar.co.uk.crt
      - elnaggar.co.uk.key
      - relnaggar.com.crt
      - relnaggar.com.key
      - PGPASSWORD
  postgres:
    secrets:
      - PGPASSWORD
secrets:
  rmsy.me.crt:
    file: /etc/letsencrypt/live/rmsy.me/cert.pem
  rmsy.me.key:
    file: /etc/letsencrypt/live/rmsy.me/privkey.pem
  el-naggar.co.uk.crt:
    file: /etc/letsencrypt/live/rmsy.me/cert.pem
  el-naggar.co.uk.key:
    file: /etc/letsencrypt/live/rmsy.me/privkey.pem
  elnaggar.co.uk.crt:
    file: /etc/letsencrypt/live/rmsy.me/cert.pem
  elnaggar.co.uk.key:
    file: /etc/letsencrypt/live/rmsy.me/privkey.pem
  relnaggar.com.crt:
    file: /etc/letsencrypt/live/rmsy.me/cert.pem
  relnaggar.com.key:
    file: /etc/letsencrypt/live/rmsy.me/privkey.pem
  PGPASSWORD:
    file: /etc/postgres/PGPASSWORD
