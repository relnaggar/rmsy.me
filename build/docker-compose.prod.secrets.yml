version: '3.7'
services:
  apache2:
    secrets:
      - rmsy.me.crt
      - rmsy.me.key
      - el-naggar.co.uk.crt
      - el-naggar.co.uk.key
      - PGPASSWORD
  postgres:
    secrets:
      - PGPASSWORD
secrets:
  rmsy.me.crt:
    file: /etc/letsencrypt/live/rmsy.me/cert.pem
  rmsy.me.key:
    file: /etc/letsencrypt/live/rmsy.me/privkey.pem
  el-naggar.co.uk.crt:
    file: /etc/letsencrypt/live/rmsy.me/cert.pem
  el-naggar.co.uk.key:
    file: /etc/letsencrypt/live/rmsy.me/privkey.pem
  PGPASSWORD:
    file: /etc/postgres/PGPASSWORD
