  el-naggar.co.uk.key:
    file: ./secrets/el-naggar.co.uk.key
  elnaggar.co.uk.crt:
    file: ./secrets/elnaggar.co.uk.crt
  elnaggar.co.uk.key:
    file: ./secrets/elnaggar.co.uk.key
  relnaggar.com.crt:
    file: ./secrets/relnaggar.com.crt
  relnaggar.com.key:
    file: ./secrets/relnaggar.com.key
  PGPASSWORD:
    file: ./secrets/PGPASSWORD
