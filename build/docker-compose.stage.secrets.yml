version: '3.7'
services:
  apache2:
    secrets:
      - rmsy.me.crt
      - rmsy.me.key
      - el-naggar.co.uk.crt
      - el-naggar.co.uk.key
      - elnaggar.co.uk.crt
      - elnaggar.co.uk.key
      - relnaggar.com.crt
      - relnaggar.com.key
      - PGPASSWORD
  postgres:
    secrets:
      - PGPASSWORD
secrets:
