version: '3.7'
services:
  apache2:
    secrets:
      - rmsy.me.crt
      - rmsy.me.key
      - el-naggar.co.uk.crt
      - el-naggar.co.uk.key
      - PGPASSWORD
  postgres:
    secrets:
      - PGPASSWORD
secrets:
  rmsy.me.crt:
    file: ./secrets/rmsy.me.crt
  rmsy.me.key:
    file: ./secrets/rmsy.me.key
  el-naggar.co.uk.crt:
    file: ./secrets/el-naggar.co.uk.crt
  el-naggar.co.uk.key:
    file: ./secrets/el-naggar.co.uk.key
  PGPASSWORD:
    file: ./secrets/PGPASSWORD
