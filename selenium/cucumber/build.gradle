 */
plugins {
    id 'java'
    id "com.scuilion.syntastic" version "0.3.8"
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'io.cucumber:cucumber-java:6.8.1'
    testImplementation 'io.cucumber:cucumber-junit:6.8.1'
    implementation 'org.seleniumhq.selenium:selenium-java:4.0.0-beta-1'
    compile group: 'io.cucumber', name: 'cucumber-picocontainer', version: '6.8.1'
}


configurations {
    cucumberRuntime {
        extendsFrom testImplementation
    }
}

task cucumber() {
    dependsOn assemble, testClasses
    doLast {
        javaexec {
            main = "io.cucumber.core.cli.Main"
            classpath = configurations.cucumberRuntime + sourceSets.main.output + sourceSets.test.output
            args = ['--plugin', 'pretty', '--glue', 'cucumber', 'src/test/resources']
        }
    }
}
