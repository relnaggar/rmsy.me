 */

plugins {
    id "java"
    id "com.scuilion.syntastic" version "0.3.8"
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.seleniumhq.selenium:selenium-java:4.0.0-beta-1'
}

sourceSets {
    main {
        java {
            srcDirs = ['java']
        }
    }
}

task run(type: JavaExec) {
    main = 'Main'
    classpath = sourceSets.main.runtimeClasspath
}
